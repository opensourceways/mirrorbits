name: build-and-coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    uses: opensourceways/agent-development-specification/.github/workflows/go-reusable.yml@main
    env:
      GOPROXY: https://goproxy.cn,direct
    with:
      runs-on: ubuntu-latest
      go-version: '1.20'
    secrets:
      gh-token: ${{ secrets.GH_TOKEN }}
